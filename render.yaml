services:
  - type: web
    name: mini-crm-backend
    env: node
    plan: free
    buildCommand: "npm install && npx prisma@5 generate --schema=./packages/database/prisma/schema.prisma && cd apps/backend && npm run build"
    startCommand: "cd apps/backend && npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mini-crm-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: 4000
      - key: CRM_WEBHOOK_URL
        value: "https://mini-crm-backend.onrender.com/api/webhooks/receipts"

  - type: web
    name: mini-crm-channel-service
    env: node
    plan: free
    buildCommand: "npm install && cd apps/channel-service && npm run build"
    startCommand: "cd apps/channel-service && npm start"
    envVars:
      - key: PORT
        value: 4001
      - key: CRM_WEBHOOK_URL
        value: "https://mini-crm-backend.onrender.com/api/webhooks/receipts"

databases:
  - name: mini-crm-db
    plan: free
